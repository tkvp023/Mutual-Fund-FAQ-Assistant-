name: Daily Data Ingestion

on:
  schedule:
    # Run daily at 10:30 AM IST (5:00 AM UTC)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Run Phase 1 — Scrape & Extract & Chunk
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== Phase 1: Scraping Groww fund pages ==="
          python scripts/run_phase1.py

          echo "=== Phase 2: Extracting & Chunking ==="
          python scripts/run_phase2.py

      - name: Run Phase 2 — Embed & Store in ChromaDB
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_PERSIST_DIR: ./chroma_db
        run: |
          echo "=== Ingesting into ChromaDB ==="
          python -m pipeline.ingest --reset

      - name: Verify ingestion
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from vectorstore.store import VectorStore
          from config.settings import CHROMA_COLLECTION_NAME, CHROMA_PERSIST_DIR
          store = VectorStore(collection_name=CHROMA_COLLECTION_NAME, persist_dir=CHROMA_PERSIST_DIR)
          count = store.count()
          print(f'✓ ChromaDB has {count} chunks')
          assert count >= 100, f'Expected >=100 chunks, got {count}'
          "

      - name: Commit updated data & ChromaDB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chroma_db/ data/
          git diff --staged --quiet || git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger Railway redeploy (optional)
        if: success()
        run: |
          if [ -n "${{ secrets.RAILWAY_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}"
            echo "✓ Railway redeploy triggered"
          else
            echo "⚠ RAILWAY_WEBHOOK_URL not set, skipping redeploy"
          fi
